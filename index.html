<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Number Extractor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0e0f0e;
  --surface:  #161714;
  --card:     #1c1e1b;
  --border:   #2a2c28;
  --border2:  #383b34;
  --text:     #e8e6df;
  --text2:    #8a8a80;
  --text3:    #55574f;
  --accent:   #b8f06a;
  --accent2:  #8fc44a;
  --danger:   #f06a6a;
  --warn:     #f0c46a;
  --radius:   12px;
  --radius-sm: 7px;
}

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2.5rem 1rem 5rem;
}

.container { max-width: 820px; margin: 0 auto; }

/* Header */
.header { margin-bottom: 2.5rem; }
.header h1 {
  font-size: clamp(26px, 5vw, 38px);
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.15;
}
.header h1 span { color: var(--accent); }
.header p { font-size: 14px; color: var(--text2); margin-top: 6px; }

/* Drop zone */
#drop-zone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--radius);
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  background: var(--surface);
  position: relative;
  transition: border-color 0.2s, background 0.2s;
}
#drop-zone:hover, #drop-zone.drag-over {
  border-color: var(--accent);
  background: #1a1f15;
}
#drop-zone input {
  position: absolute; inset: 0; opacity: 0;
  cursor: pointer; width: 100%; height: 100%;
}
.drop-icon {
  width: 48px; height: 48px; border-radius: 50%;
  background: #222820;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  font-size: 20px;
}
.drop-title { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
.drop-hint { font-size: 13px; color: var(--text2); }
.drop-hint b { color: var(--accent); font-weight: 500; }

/* Thumbnails */
#thumbnails {
  display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1rem;
}
.thumb {
  position: relative; width: 84px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  overflow: hidden; background: var(--card);
  transition: border-color 0.15s;
}
.thumb:hover { border-color: var(--border2); }
.thumb img { width: 100%; height: 68px; object-fit: cover; display: block; }
.thumb-name {
  font-size: 9px; color: var(--text2); padding: 4px 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: 'DM Mono', monospace;
}
.thumb-remove {
  position: absolute; top: 4px; right: 4px;
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(0,0,0,0.7); border: 1px solid var(--border2);
  color: var(--text2); font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; line-height: 1;
}
.thumb-remove:hover { color: var(--danger); border-color: var(--danger); }

/* Actions row */
.actions {
  display: flex; gap: 10px; margin-top: 1.25rem; align-items: center;
}
.count-badge {
  font-size: 12px; color: var(--text2);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px;
  font-family: 'DM Mono', monospace;
}
.count-badge b { color: var(--accent); }

button.primary {
  padding: 10px 24px; font-size: 14px; font-weight: 600;
  background: var(--accent); color: #0e0f0e;
  border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-family: 'Syne', sans-serif;
  letter-spacing: 0.2px;
  transition: background 0.15s, transform 0.1s;
}
button.primary:hover { background: var(--accent2); }
button.primary:active { transform: scale(0.97); }
button.primary:disabled { opacity: 0.35; cursor: not-allowed; }

button.ghost {
  padding: 9px 16px; font-size: 13px;
  background: transparent; color: var(--text2);
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  cursor: pointer; font-family: 'Syne', sans-serif;
  transition: color 0.15s, border-color 0.15s;
}
button.ghost:hover { color: var(--text); border-color: var(--text3); }

/* Divider */
hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

/* Summary banner */
#summary-banner {
  display: none;
  background: #161d10;
  border: 1px solid #2d4020;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 1.5rem;
}
.summary-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.summary-label { font-size: 12px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.summary-numbers {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.num-pill {
  font-family: 'DM Mono', monospace;
  font-size: 13px; color: var(--accent);
  background: #1e2d16; border: 1px solid #3a5528;
  border-radius: 20px; padding: 5px 14px;
  cursor: pointer; transition: background 0.1s;
  user-select: all;
}
.num-pill:hover { background: #263a1d; }
.num-pill.copied { color: #fff; background: #2d4d20; }

/* Result cards */
#results-list { display: flex; flex-direction: column; gap: 12px; }

.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.result-head {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.result-img {
  width: 42px; height: 42px; border-radius: var(--radius-sm);
  object-fit: cover; flex-shrink: 0;
  border: 1px solid var(--border);
}
.result-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  font-family: 'DM Mono', monospace; white-space: nowrap;
}
.badge-processing { background: #2a2410; color: var(--warn); border: 1px solid #3d3415; }
.badge-done       { background: #162010; color: var(--accent); border: 1px solid #2d4020; }
.badge-error      { background: #2a1010; color: var(--danger); border: 1px solid #3d1515; }
.badge-none       { background: var(--card); color: var(--text3); border: 1px solid var(--border); }

.result-body { padding: 14px 16px; }

.numbers-found {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;
}

.raw-toggle {
  font-size: 12px; color: var(--text3); cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
  user-select: none;
  transition: color 0.15s;
}
.raw-toggle:hover { color: var(--text2); }
.raw-text {
  display: none; margin-top: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--text2); line-height: 1.7;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px; white-space: pre-wrap; word-break: break-word;
  max-height: 200px; overflow-y: auto;
}

/* Skeleton */
.skeleton {
  background: var(--border); border-radius: 4px;
  height: 12px; margin-bottom: 8px; width: 100%;
  animation: pulse 1.2s ease-in-out infinite;
}
.skeleton:nth-child(2) { width: 72%; }
.skeleton:nth-child(3) { width: 50%; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }

/* Empty state */
#empty-hint {
  text-align: center; padding: 3rem 0;
  color: var(--text3); font-size: 14px; display: none;
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Contact Number<br><span>Extractor</span></h1>
    <p>Upload images — Indian phone numbers are extracted instantly using OCR.</p>
  </div>

  <!-- Drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*" multiple />
    <div class="drop-icon">📁</div>
    <div class="drop-title">Drop images here</div>
    <div class="drop-hint">or <b>browse from any folder</b> · JPG, PNG, WEBP supported</div>
  </div>

  <div id="thumbnails"></div>

  <div class="actions">
    <span class="count-badge" id="count-badge"><b>0</b> images selected</span>
    <button class="primary" id="extract-btn" disabled>Extract Numbers</button>
    <button class="ghost" id="clear-btn" style="display:none">Clear all</button>
  </div>

  <div id="results-area" style="display:none">
    <hr />

    <!-- Summary -->
    <div id="summary-banner">
      <div class="summary-top">
        <span class="summary-label">All unique numbers</span>
        <button class="ghost" id="copy-all-btn" style="font-size:12px;padding:6px 12px">Copy all</button>
      </div>
      <div class="summary-numbers" id="summary-numbers"></div>
    </div>

    <!-- Per-image results -->
    <div id="results-list"></div>
    <div id="empty-hint">No phone numbers found in any image.</div>
  </div>

</div>

<script>
const fileInput   = document.getElementById('file-input');
const dropZone    = document.getElementById('drop-zone');
const thumbsEl    = document.getElementById('thumbnails');
const countBadge  = document.getElementById('count-badge');
const extractBtn  = document.getElementById('extract-btn');
const clearBtn    = document.getElementById('clear-btn');
const resultsArea = document.getElementById('results-area');
const resultsList = document.getElementById('results-list');
const summaryBanner = document.getElementById('summary-banner');
const summaryNumbers = document.getElementById('summary-numbers');
const copyAllBtn  = document.getElementById('copy-all-btn');
const emptyHint   = document.getElementById('empty-hint');

let files = [];

/* ── File handling ── */
function addFiles(newFiles) {
  Array.from(newFiles).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    if (files.find(x => x.name === f.name && x.size === f.size)) return; // dedupe
    files.push(f);
  });
  renderThumbs();
}

function renderThumbs() {
  thumbsEl.innerHTML = '';
  files.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    const card = document.createElement('div');
    card.className = 'thumb';
    card.innerHTML = `
      <img src="${url}" alt="${f.name}" />
      <div class="thumb-name">${f.name}</div>
      <button class="thumb-remove" data-i="${i}" title="Remove">✕</button>
    `;
    thumbsEl.appendChild(card);
  });
  thumbsEl.querySelectorAll('.thumb-remove').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      files.splice(+btn.dataset.i, 1);
      renderThumbs();
    });
  });
  countBadge.innerHTML = `<b>${files.length}</b> image${files.length !== 1 ? 's' : ''} selected`;
  extractBtn.disabled = files.length === 0;
  clearBtn.style.display = files.length ? 'inline-block' : 'none';
}

fileInput.addEventListener('change', e => addFiles(e.target.files));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});
clearBtn.addEventListener('click', () => { files = []; renderThumbs(); });

/* ── Extraction ── */
extractBtn.addEventListener('click', async () => {
  if (!files.length) return;
  extractBtn.disabled = true;
  extractBtn.textContent = 'Extracting…';
  resultsArea.style.display = 'block';
  resultsList.innerHTML = '';
  summaryBanner.style.display = 'none';
  emptyHint.style.display = 'none';

  // Show skeletons immediately
  files.forEach((f, i) => {
    const card = makeSkeletonCard(f, i);
    resultsList.appendChild(card);
  });

  // Upload & process
  const formData = new FormData();
  files.forEach(f => formData.append('images', f));

  try {
    const resp = await fetch('/extract', { method: 'POST', body: formData });
    const data = await resp.json();

    if (data.error) {
      resultsList.innerHTML = `<div style="color:var(--danger);font-size:14px;padding:1rem">${data.error}</div>`;
    } else {
      resultsList.innerHTML = '';
      data.results.forEach((r, i) => {
        const card = makeResultCard(r, i);
        resultsList.appendChild(card);
      });

      // Summary
      if (data.all_numbers.length > 0) {
        summaryBanner.style.display = 'block';
        summaryNumbers.innerHTML = '';
        data.all_numbers.forEach(num => {
          const pill = document.createElement('span');
          pill.className = 'num-pill';
          pill.textContent = num;
          pill.title = 'Click to copy';
          pill.addEventListener('click', () => copyText(num, pill));
          summaryNumbers.appendChild(pill);
        });
      } else {
        emptyHint.style.display = 'block';
      }
    }
  } catch (err) {
    resultsList.innerHTML = `<div style="color:var(--danger);font-size:14px;padding:1rem">Server error: ${err.message}<br><small style="color:var(--text2)">Make sure app.py is running on port 5000.</small></div>`;
  }

  extractBtn.disabled = false;
  extractBtn.textContent = 'Extract Numbers';
});

/* ── Card builders ── */
function makeSkeletonCard(f, i) {
  const url = URL.createObjectURL(f);
  const card = document.createElement('div');
  card.className = 'result-card';
  card.style.animationDelay = `${i * 60}ms`;
  card.innerHTML = `
    <div class="result-head">
      <img class="result-img" src="${url}" />
      <span class="result-name">${esc(f.name)}</span>
      <span class="badge badge-processing">processing…</span>
    </div>
    <div class="result-body">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  `;
  return card;
}

function makeResultCard(r, i) {
  const card = document.createElement('div');
  card.className = 'result-card';
  card.style.animationDelay = `${i * 60}ms`;

  let badgeHtml, bodyHtml;

  if (r.error) {
    badgeHtml = `<span class="badge badge-error">error</span>`;
    bodyHtml  = `<div style="font-size:13px;color:var(--danger)">${esc(r.error)}</div>`;
  } else if (r.numbers.length === 0) {
    badgeHtml = `<span class="badge badge-none">no numbers</span>`;
    bodyHtml  = `<div style="font-size:13px;color:var(--text3)">No phone numbers detected.</div>`;
  } else {
    badgeHtml = `<span class="badge badge-done">${r.numbers.length} found</span>`;
    const pills = r.numbers.map(n =>
      `<span class="num-pill" onclick="copyPill(this,'${n}')" title="Click to copy">${esc(n)}</span>`
    ).join('');
    bodyHtml = `<div class="numbers-found">${pills}</div>`;
  }

  if (r.text) {
    bodyHtml += `
      <div class="raw-toggle" onclick="toggleRaw(this)">▶ Show raw OCR text</div>
      <div class="raw-text">${esc(r.text)}</div>
    `;
  }

  card.innerHTML = `
    <div class="result-head">
      <img class="result-img" src="${r.preview}" />
      <span class="result-name">${esc(r.filename)}</span>
      ${badgeHtml}
    </div>
    <div class="result-body">${bodyHtml}</div>
  `;
  return card;
}

/* ── Helpers ── */
function toggleRaw(el) {
  const raw = el.nextElementSibling;
  const open = raw.style.display === 'block';
  raw.style.display = open ? 'none' : 'block';
  el.textContent = (open ? '▶' : '▼') + ' ' + (open ? 'Show' : 'Hide') + ' raw OCR text';
}

function copyPill(el, text) { copyText(text, el); }

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = el.textContent;
    el.classList.add('copied');
    el.textContent = '✓ Copied';
    setTimeout(() => { el.classList.remove('copied'); el.textContent = orig; }, 1400);
  });
}

copyAllBtn.addEventListener('click', () => {
  const all = Array.from(summaryNumbers.querySelectorAll('.num-pill'))
    .map(p => p.textContent).join('\n');
  navigator.clipboard.writeText(all).then(() => {
    copyAllBtn.textContent = '✓ Copied!';
    setTimeout(() => { copyAllBtn.textContent = 'Copy all'; }, 1500);
  });
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
